# KindleTRMNL Configuration
# Edit this file, then restart TRMNL from KUAL for changes to take effect.
#
# Lines starting with # are comments.
# Do not add spaces around = signs.

# ─── Server ──────────────────────────────────────────────────────────────────
# Your self-hosted BYOS TRMNL server URL (no trailing slash)
BYOS_URL=http://192.168.1.100:3000

# API key shown in the LaraPaper device list (Settings > Devices > your device).
# Sent as the Access-Token header on every display request.
# After installation, restrict file permissions on the Kindle:
#   chmod 600 /mnt/us/extensions/KindleTRMNL/config.conf
API_KEY=REPLACE_WITH_YOUR_API_KEY

# ─── Power Mode ──────────────────────────────────────────────────────────────
# always_on  : Screen always visible; device never sleeps; WiFi off between fetches
# deep_sleep  : Device suspends to RAM between every refresh (max battery savings)
# hybrid     : Active window defined by ACTIVE_HOURS; deep sleeps outside that window
POWER_MODE=hybrid

# ─── Active Window (hybrid / always_on modes) ────────────────────────────────
# Hours during which the dashboard is active. Format: HH:MM-HH:MM (24-hour).
# Outside this window, the device deep-sleeps until the window opens.
ACTIVE_HOURS=07:00-22:00

# ─── Refresh Schedule ────────────────────────────────────────────────────────
# Option A — specific times (comma-separated HH:MM, 24-hour).
#   Refreshes happen exactly at these clock times within the active window.
#   Leave empty to use REFRESH_INTERVAL instead.
REFRESH_TIMES=08:00,12:00,17:00,20:00

# Option B — interval in seconds (used only when REFRESH_TIMES is empty).
REFRESH_INTERVAL=900

# ─── Day Filter ──────────────────────────────────────────────────────────────
# Comma-separated ISO weekday numbers: 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri,
# 6=Sat, 7=Sun.  Leave blank to run every day.
# Example weekdays only: REFRESH_DAYS=1,2,3,4,5
REFRESH_DAYS=

# ─── Battery Safety ──────────────────────────────────────────────────────────
# Daemon shuts itself down when battery falls below this % AND the device is
# not charging.  Prevents deep discharge.
LOW_BATTERY_THRESHOLD=15

# ─── Display Options ─────────────────────────────────────────────────────────
# Show a small status line (battery %, last refresh time, next refresh time)
# in the bottom-left corner after each image update.
DISPLAY_BATTERY=true

# When the device is outside ACTIVE_HOURS, show a blank screen (true) or
# keep displaying the last cached image (false).
BLANK_OUTSIDE_HOURS=false

# Use partial e-ink refresh instead of full refresh (faster, less flicker,
# may leave slight ghosting on some devices).
PARTIAL_REFRESH=false

# Number of full clear passes before each full image draw.
# Higher values reduce ghosting but increase flicker and refresh time.
# Used only when PARTIAL_REFRESH=false. Typical values: 1-3.
FULL_REFRESH_PASSES=2

# When the screen is tapped, a confirmation prompt is shown. Tap again within
# this many seconds to quit the dashboard; otherwise it resumes automatically.
QUIT_PROMPT_TIMEOUT=10

# ─── Network ─────────────────────────────────────────────────────────────────
# Seconds to wait for WiFi to associate (and obtain an IP) before giving up and
# using the cached image. Waking from deep sleep can take a while to reconnect.
WIFI_TIMEOUT=60

# ─── Logging ─────────────────────────────────────────────────────────────────
# Log file is rotated when it exceeds this size (bytes).  Default = 512 KB.
LOG_MAX_BYTES=524288
